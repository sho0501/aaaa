<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VocabMaster</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (ブラウザ内でJSXをコンパイル) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SortableJS (ドラッグ＆ドロップ並び替え用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <!-- ネイティブアプリ風UIのためのCSS -->
    <style>
        :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: max(var(--sat), 0.75rem); }
        .pb-safe { padding-bottom: max(var(--sab), 1rem); }
        .pb-safe-offset { padding-bottom: max(calc(var(--sab) + 1.5rem), 1.5rem); }
        
        body { 
          overscroll-behavior-y: none; /* バウンススクロール防止 */
          -webkit-tap-highlight-color: transparent; /* タップハイライト消去 */
          background-color: #f8fafc;
        }
        
        .app-container {
          user-select: none; /* テキスト選択無効化 */
          -webkit-user-select: none;
          -webkit-touch-callout: none;
        }
        
        .selectable-text {
          user-select: text; /* 必要な箇所だけ選択可能にする */
          -webkit-user-select: text;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .perspective-1000 { perspective: 1000px; } 
        .transform-style-preserve-3d { transform-style: preserve-3d; } 
        .backface-hidden { backface-visibility: hidden; } 
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .btn-3d { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(0); border-bottom-width: 4px; }
        .btn-3d:active { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
        .btn-3d:disabled { transform: none; border-bottom-width: 0px; margin-top: 0px; opacity: 0.5; }
        
        .btn-active { transition: transform 0.1s, opacity 0.1s; }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }

        /* ワードタイルのDuolingo風デザイン */
        .word-tile { 
          background-color: white; 
          border: 2px solid #e5e7eb; 
          border-bottom-width: 4px;
          color: #4b5563; 
          border-radius: 12px; 
          padding: 8px 14px; 
          font-weight: 700; 
          font-size: 1rem; 
          cursor: grab; 
          display: inline-flex; 
          align-items: center; 
          justify-content: center; 
          min-height: 46px; 
          touch-action: none; 
          position: relative; 
          z-index: 10; 
          margin: 4px;
          user-select: none;
          -webkit-user-select: none;
          transition: border-color 0.15s, background-color 0.15s;
        }
        .word-tile:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background-color: #f3f4f6; border-style: dashed; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- ここからReactアプリケーションのコード -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- STREAMING_CHUNK: Initializing audio assets and helper functions ---
        const AUDIO_CORRECT = new Audio('https://www.myinstants.com/media/sounds/duolingo-correct.mp3');
        const AUDIO_WRONG = new Audio('https://www.myinstants.com/media/sounds/duolingo-wrong.mp3');
        const AUDIO_COMPLETE = new Audio('https://www.myinstants.com/media/sounds/duolingo-completed-lesson.mp3');

        let audioCtx = null;
        const playTone = (freq, type, duration, startTime=0) => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); 
            const gain = audioCtx.createGain();
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTime); 
            osc.stop(audioCtx.currentTime + startTime + duration);
        };

        const playFallback = (type) => {
            try {
                if (type === 'correct') { playTone(523, 'sine', 0.1); playTone(659, 'sine', 0.1, 0.1); }
                else if (type === 'wrong') { playTone(150, 'sawtooth', 0.3); }
                else if (type === 'complete') { playTone(523, 'sine', 0.1); playTone(659, 'sine', 0.1, 0.1); playTone(783, 'sine', 0.1, 0.2); }
                else { playTone(800, 'sine', 0.05); } // pop
            } catch(e) { console.error(e); }
        };

        const playSound = (audioObj, fallbackType) => {
            try {
                const s = audioObj.cloneNode();
                s.play().catch(() => playFallback(fallbackType));
            } catch (e) {
                playFallback(fallbackType);
            }
        };

        // --- STREAMING_CHUNK: Setting up Progressive Web App configurations ---
        const usePWA = () => {
          useEffect(() => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            const metas = [
              { name: 'apple-mobile-web-app-capable', content: 'yes' },
              { name: 'apple-mobile-web-app-status-bar-style', content: 'default' },
              { name: 'apple-mobile-web-app-title', content: 'VocabMaster' },
              { name: 'theme-color', content: '#2563eb' }
            ];
            metas.forEach(m => {
              if (!document.querySelector(`meta[name="${m.name}"]`)) {
                let meta = document.createElement('meta');
                meta.name = m.name;
                meta.content = m.content;
                document.head.appendChild(meta);
              }
            });

            const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#2563eb"/><path d="M128 128 L256 384 L384 128" stroke="white" stroke-width="48" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
            const iconUrl = 'data:image/svg+xml;base64,' + btoa(iconSvg);

            if (!document.querySelector('link[rel="manifest"]')) {
              const manifest = {
                name: 'VocabMaster',
                short_name: 'Vocab',
                description: 'インタラクティブな単語帳アプリ',
                start_url: '.',
                display: 'standalone',
                background_color: '#f8fafc',
                theme_color: '#2563eb',
                icons: [{ src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }]
              };
              const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
              const manifestUrl = URL.createObjectURL(manifestBlob);
              const link = document.createElement('link');
              link.rel = 'manifest';
              link.href = manifestUrl;
              document.head.appendChild(link);
            }

            if (isIOS && !document.querySelector('link[rel="apple-touch-icon"]')) {
              const appleIcon = document.createElement('link');
              appleIcon.rel = 'apple-touch-icon';
              appleIcon.href = iconUrl;
              document.head.appendChild(appleIcon);
            }

            try {
              if ('serviceWorker' in navigator) {
                const swCode = `self.addEventListener('install', e => e.waitUntil(self.skipWaiting())); self.addEventListener('activate', e => e.waitUntil(self.clients.claim())); self.addEventListener('fetch', e => {});`;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
              }
            } catch (e) {}
          }, []);
        };

        // --- STREAMING_CHUNK: Defining UI child components ---
        const HiddenText = ({ text, hide, className = "" }) => {
          const [revealed, setRevealed] = useState(false);
          useEffect(() => { setRevealed(false); }, [hide]);
          if (!hide) return <span className={className}>{text}</span>;
          return (
            <span 
              onClick={(e) => { e.stopPropagation(); setRevealed(!revealed); }}
              className={`cursor-pointer rounded transition-all duration-200 select-none ${
                revealed ? `bg-yellow-100 text-slate-800 ${className}` : 'bg-slate-300 text-transparent hover:bg-slate-400'
              }`}
              title="タップして表示"
            >
              {text || '　　'}
            </span>
          );
        };

        const QuizTips = ({ wordObj }) => (
          <div className="mt-2 text-left text-sm leading-relaxed">
            <b>単語:</b> {wordObj.word} ({wordObj.pos.map(p => p.label).join(', ')})<br/>
            {wordObj.exampleEn && (<><b>例文:</b> {wordObj.exampleEn}<br/><b>訳:</b> {wordObj.exampleJa}</>)}
          </div>
        );

        // --- STREAMING_CHUNK: Defining sorting question component (SortableJS + React) ---
        const SortQuestion = ({ q, userAnswer, setUserAnswer, feedback }) => {
          const areaRef = useRef(null);
          const [tiles, setTiles] = useState([]); 

          // 質問が変わるたびにStateを初期化＆シャッフル
          useEffect(() => {
            const shuffled = [...q.words].sort(() => 0.5 - Math.random());
            const initialTiles = shuffled.map((w, idx) => ({
              id: `${q.id}_${idx}_${w}`,
              word: w,
              location: 'bank',
              order: idx
            }));
            setTiles(initialTiles);
            setUserAnswer('');
          }, [q]);

          // タイルクリック時のトグル移動（仮想DOMと物理DOM不整合を100%回避するベストプラクティス）
          const handleTileClick = (tileId) => {
            if (feedback) return; 
            playFallback('pop');
            setTiles(prev => {
              const updated = prev.map(t => {
                if (t.id === tileId) {
                  return { 
                    ...t, 
                    location: t.location === 'bank' ? 'area' : 'bank', 
                    order: t.location === 'bank' ? Date.now() : t.order 
                  };
                }
                return t;
              });
              
              // エリアにある単語を順序通りに結合して回答を作成
              const areaWords = updated
                .filter(t => t.location === 'area')
                .sort((a, b) => a.order - b.order)
                .map(t => t.word)
                .join(' ');
              setUserAnswer(areaWords);
              return updated;
            });
          };

          // SortableJSをバインドしてエリア内だけのドラッグを有効化
          useEffect(() => {
            if (!areaRef.current || feedback) return;

            const sortableArea = window.Sortable.create(areaRef.current, {
              animation: 150,
              ghostClass: 'sortable-ghost',
              onEnd: () => {
                playFallback('pop');
                // DOM上の配置順からIDリストを抽出
                const orderedIds = Array.from(areaRef.current.children).map(el => el.getAttribute('data-id'));
                
                setTiles(prev => {
                  const updated = prev.map(t => {
                    const newIndex = orderedIds.indexOf(t.id);
                    if (newIndex !== -1) {
                      return { ...t, order: newIndex };
                    }
                    return t;
                  });

                  // エリア内の単語を正しい並び順で回答に反映
                  const areaWords = updated
                    .filter(t => t.location === 'area')
                    .sort((a, b) => a.order - b.order)
                    .map(t => t.word)
                    .join(' ');
                  setUserAnswer(areaWords);
                  return updated;
                });
              }
            });

            return () => {
              sortableArea.destroy();
            };
          }, [tiles, feedback]);

          const bankTiles = tiles.filter(t => t.location === 'bank');
          const areaTiles = tiles.filter(t => t.location === 'area').sort((a, b) => a.order - b.order);

          return (
            <div className="space-y-6">
              <div>
                <div className="text-xs text-slate-400 mb-1 font-bold pl-1 uppercase tracking-wider">並べ替えエリア</div>
                <div 
                  ref={areaRef}
                  className="flex flex-wrap gap-2 items-center border-b-2 border-slate-200 pb-8 pt-2 px-2 bg-white rounded-xl shadow-sm min-h-[100px]"
                >
                  {areaTiles.map(t => (
                    <div 
                      key={t.id} 
                      data-id={t.id}
                      data-word={t.word}
                      onClick={() => handleTileClick(t.id)}
                      className="word-tile bg-white border-2 border-slate-200 text-slate-700 rounded-xl px-3 py-2 font-bold text-sm sm:text-base cursor-pointer shadow-sm select-none btn-active"
                    >
                      {t.word}
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <div className="text-xs text-slate-400 mb-1 font-bold pl-1 uppercase tracking-wider">単語リスト (タップして並べ替えエリアに配置)</div>
                <div 
                  className="flex flex-wrap gap-2 justify-center bg-slate-100 rounded-xl p-4 min-h-[120px]"
                >
                  {bankTiles.map(t => (
                    <div 
                      key={t.id} 
                      data-id={t.id}
                      data-word={t.word}
                      onClick={() => handleTileClick(t.id)}
                      className="word-tile bg-white border-2 border-slate-200 text-slate-700 rounded-xl px-3 py-2 font-bold text-sm sm:text-base cursor-pointer shadow-sm select-none btn-active"
                    >
                      {t.word}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        };

        // --- STREAMING_CHUNK: Defining main application structure ---
        function App() {
          usePWA(); 

          const [data, setData] = useState([]);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          
          const [hideMode, setHideMode] = useState(false);
          const [viewMode, setViewMode] = useState('list');
          const [searchQuery, setSearchQuery] = useState('');
          const [showOnlyBookmarks, setShowOnlyBookmarks] = useState(false);
          const [showInstallGuide, setShowInstallGuide] = useState(false);
          
          const [bookmarks, setBookmarks] = useState(() => {
            try { const saved = localStorage.getItem('vocab_bookmarks'); return saved ? JSON.parse(saved) : {}; } catch (e) { return {}; }
          });

          const [currentPage, setCurrentPage] = useState(1);
          const itemsPerPage = 50;

          const [cardIndex, setCardIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);

          const [quizState, setQuizState] = useState('setup');
          const [quizConfig, setQuizConfig] = useState({ start: 1, end: 10 }); 
          const [questions, setQuestions] = useState([]);
          const [currentQIndex, setCurrentQIndex] = useState(0);
          const [userAnswer, setUserAnswer] = useState('');
          const [score, setScore] = useState(0);
          const [incorrectQuestions, setIncorrectQuestions] = useState([]);
          const [feedback, setFeedback] = useState(null);

          const listTopRef = useRef(null);

          useEffect(() => {
            const fetchData = async () => {
              try {
                setLoading(true);
                const response = await fetch('https://script.google.com/macros/s/AKfycbwJnHh26MaaOdmNNZOaMDScnBPfBp5lwrCDfQho-ciyWLJHFEnArWL2SP_MW6OVPBlT/exec');
                if (!response.ok) throw new Error('ネットワークエラーが発生しました');
                const rawData = await response.json();
                const parsedData = rawData.map((item, index) => {
                  const posTypes = ["名", "自", "他", "形", "副", "代", "前", "接", "助"];
                  const pos = [];
                  posTypes.forEach(type => { if (item[type]) pos.push({ type, label: item[type] }); });
                  return {
                    id: item["英単語"] || `word-${index}`,
                    index: index + 1,
                    word: item["英単語"],
                    pos: pos,
                    exampleEn: item["英語例文"],
                    exampleJa: item["日本語例文"],
                    notes: item["豆知識"] ? item["豆知識"].split('\n') : []
                  };
                });
                setData(parsedData);
              } catch (err) {
                setError(err.message);
              } finally {
                setLoading(false);
              }
            };
            fetchData();
          }, []);

          const toggleBookmark = (id, e) => {
            if (e) e.stopPropagation();
            setBookmarks(prev => {
              const next = { ...prev };
              if (next[id]) delete next[id]; else next[id] = true;
              localStorage.setItem('vocab_bookmarks', JSON.stringify(next));
              return next;
            });
          };

          const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'en-US';
              window.speechSynthesis.speak(utterance);
            }
          };

          const filteredWords = useMemo(() => {
            return data.filter(item => {
              const matchesSearch = item.word.toLowerCase().includes(searchQuery.toLowerCase()) || item.pos.some(p => p.label.includes(searchQuery)) || (item.exampleJa && item.exampleJa.includes(searchQuery));
              const matchesBookmark = showOnlyBookmarks ? bookmarks[item.id] : true;
              return matchesSearch && matchesBookmark;
            });
          }, [data, searchQuery, showOnlyBookmarks, bookmarks]);

          const totalPages = Math.ceil(filteredWords.length / itemsPerPage);
          const currentDisplayedWords = useMemo(() => {
            if (viewMode !== 'list') return filteredWords;
            const startIdx = (currentPage - 1) * itemsPerPage;
            return filteredWords.slice(startIdx, startIdx + itemsPerPage);
          }, [filteredWords, currentPage, viewMode]);

          const handlePageChange = (newPage) => {
            if (newPage >= 1 && newPage <= totalPages) {
              setCurrentPage(newPage);
              if (listTopRef.current) {
                window.scrollTo({ top: listTopRef.current.offsetTop - 80, behavior: 'smooth' });
              }
            }
          };

          // --- STREAMING_CHUNK: Setting up quiz question generator ---
          const generateQuiz = () => {
            const { start, end } = quizConfig;
            const targetWords = data.filter(d => d.index >= start && d.index <= end);
            if (targetWords.length === 0) return alert("指定された範囲に単語がありません。");

            const selectedWords = [...targetWords].sort(() => 0.5 - Math.random());
            const generatedQuestions = selectedWords.map((wordObj, i) => {
              const types = ['en-ja', 'ja-en'];
              if (wordObj.exampleEn) {
                types.push('sort'); // 並べ替え問題
              }
              if (wordObj.exampleJa) {
                types.push('translation'); // 訳択問題
              }

              const type = types[Math.floor(Math.random() * types.length)];
              const qId = `q_${i}`;
              const correctMeaning = wordObj.pos.map(p => p.label).join(', ');

              if (type === 'en-ja') {
                const dummyMeanings = data.filter(d => d.id !== wordObj.id).map(d => d.pos.map(p => p.label).join(', ')).sort(() => 0.5 - Math.random()).slice(0, 3);
                return { id: qId, type, wordObj, question: `次の英単語が表す日本語を選択肢から選びなさい\n${wordObj.word}`, correctAnswer: correctMeaning, options: [...dummyMeanings, correctMeaning].sort(() => 0.5 - Math.random()) };
              } else if (type === 'ja-en') {
                const dummyWords = data.filter(d => d.id !== wordObj.id).map(d => d.word).sort(() => 0.5 - Math.random()).slice(0, 3); 
                return { id: qId, type, wordObj, question: `次の日本語が表す英単語を選択肢から選びなさい\n「${correctMeaning}」`, correctAnswer: wordObj.word, options: [...dummyWords, wordObj.word].sort(() => 0.5 - Math.random()) };
              } else if (type === 'translation') {
                const dummyTranslations = data.filter(d => d.id !== wordObj.id && d.exampleJa).map(d => d.exampleJa).sort(() => 0.5 - Math.random()).slice(0, 3);
                return { id: qId, type, wordObj, question: `英文の日本語訳として正しいものを選びなさい\n${wordObj.exampleEn}`, correctAnswer: wordObj.exampleJa, options: [...dummyTranslations, wordObj.exampleJa].sort(() => 0.5 - Math.random()) };
              } else {
                // 並べ替え問題
                const rawWords = wordObj.exampleEn.trim().split(/\s+/);
                return {
                  id: qId,
                  type,
                  wordObj,
                  question: `並べ替えて日本語の意味に合う英文を作りなさい。\n「${wordObj.exampleJa}」`,
                  correctAnswer: wordObj.exampleEn.trim().replace(/\s+/g, ' '),
                  words: rawWords
                };
              }
            });

            setQuestions(generatedQuestions);
            setIncorrectQuestions([]);
            setCurrentQIndex(0);
            setScore(0);
            setFeedback(null);
            setUserAnswer('');
            setQuizState('playing');
          };

          // --- STREAMING_CHUNK: Handling answer checks with normalizations ---
          const checkAnswer = () => {
            const q = questions[currentQIndex];
            
            // 英文チェック時の揺らぎ（末尾スペースや大文字小文字、ピリオド等の有無）を吸収する簡易ノーマライズ
            const cleanUser = userAnswer.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s+/g, ' ').toLowerCase();
            const cleanCorrect = q.correctAnswer.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").replace(/\s+/g, ' ').toLowerCase();
            const isCorrect = cleanUser === cleanCorrect;

            if (isCorrect) {
                setScore(s => s + 1);
                playSound(AUDIO_CORRECT, 'correct');
                setFeedback('correct');
            } else {
                setIncorrectQuestions(prev => { if (!prev.find(item => item.id === q.id)) return [...prev, q]; return prev; });
                playSound(AUDIO_WRONG, 'wrong');
                setFeedback('wrong');
            }
          };

          const nextQuestion = () => {
            setFeedback(null);
            setUserAnswer('');
            if (currentQIndex + 1 < questions.length) {
                setCurrentQIndex(currentQIndex + 1);
            } else {
                playSound(AUDIO_COMPLETE, 'complete');
                setQuizState('result');
            }
          };

          const retryMistakes = () => {
            setQuestions(incorrectQuestions);
            setIncorrectQuestions([]);
            setCurrentQIndex(0);
            setScore(0);
            setFeedback(null);
            setUserAnswer('');
            setQuizState('playing');
          };

          const calculatedQuizCount = Math.max(0, data.filter(d => d.index >= quizConfig.start && d.index <= quizConfig.end).length);

          const InstallGuideModal = () => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={() => setShowInstallGuide(false)}>
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-xl font-bold text-slate-800">ホーム画面に追加</h3>
                  <button onClick={() => setShowInstallGuide(false)} className="text-slate-400 p-1"><i className="fas fa-times text-xl"></i></button>
                </div>
                <div className="space-y-4 text-slate-600 text-sm">
                  <p>このアプリはホーム画面に追加して、全画面で快適に利用できます。</p>
                  <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h4 className="font-bold text-slate-800 mb-2">🍎 iPhone / iPad の場合</h4>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
